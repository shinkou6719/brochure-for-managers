<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Лесоруб Бани — Каталог проектов</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-inner">
      <div class="logo">
        <span class="logo-icon">🌲</span>
        <div>
          <div class="logo-title">Лесоруб</div>
          <div class="logo-sub">Product Book</div>
        </div>
      </div>

      <div class="search-wrap">
        <svg class="search-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8">
          <circle cx="8.5" cy="8.5" r="5.5"/><path d="M15 15l-3-3"/>
        </svg>
        <input type="text" id="searchInput" placeholder="Поиск по размеру, линейке...">
      </div>

      <nav class="filters">
        <div class="filter-section">
          <div class="filter-label">Назначение</div>
          <div class="filter-btns" id="purposeFilters">
            <button class="filter-btn active" data-purpose="Все">Все</button>
            <button class="filter-btn" data-purpose="Дача">Дача</button>
            <button class="filter-btn" data-purpose="Дом">Дом / Баня-Дом</button>
          </div>
        </div>

        <div class="filter-section">
          <div class="filter-label">Линейка</div>
          <div class="filter-btns" id="lineupFilters">
            <button class="filter-btn active" data-lineup="Все">Все</button>
            <button class="filter-btn" data-lineup="Дачная">Дачная</button>
            <button class="filter-btn" data-lineup="Народная">Народная</button>
            <button class="filter-btn" data-lineup="Пинтерест">Пинтерест</button>
            <button class="filter-btn" data-lineup="Авторский">Авторский</button>
            <button class="filter-btn" data-lineup="Дом-баня">Дом-баня</button>
          </div>
        </div>

        <div class="filter-section">
          <div class="filter-label">Комплектация</div>
          <div class="filter-btns" id="subtypeFilters">
            <button class="filter-btn active" data-subtype="Все">Все</button>
            <button class="filter-btn" data-subtype="Базовая">Базовая</button>
            <button class="filter-btn" data-subtype="Классика">Классика</button>
            <button class="filter-btn" data-subtype="Комфорт">Комфорт</button>
          </div>
        </div>

        <div class="filter-section">
          <div class="filter-label">Только с ценой</div>
          <label class="toggle-wrap">
            <input type="checkbox" id="onlyPriced">
            <span class="toggle"></span>
            <span class="toggle-label">Скрыть без цены</span>
          </label>
        </div>
      </nav>

      <div class="sidebar-footer">
        <div class="stats" id="statsBar">Загрузка...</div>
      </div>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main" id="main">

    <!-- LIST VIEW -->
    <div class="list-view" id="listView">
      <div class="list-header">
        <h1 class="page-title">Каталог бань</h1>
        <p class="page-sub">Выберите проект — откроется полная информация</p>
      </div>
      <div class="products-grid" id="productsContainer"></div>
    </div>

    <!-- DETAIL VIEW -->
    <div class="detail-view hidden" id="detailView">
      <button class="back-btn" id="backBtn">
        <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 5l-7 5 7 5"/>
        </svg>
        Назад к каталогу
      </button>
      <div id="detailContent"></div>
    </div>

  </main>

  <!-- MOBILE TOGGLE -->
  <button class="sidebar-toggle" id="sidebarToggle" aria-label="Открыть фильтры">
    <svg viewBox="0 0 20 20" fill="currentColor">
      <path d="M3 5h14M3 10h14M3 15h14" stroke="currentColor" stroke-width="2" fill="none"/>
    </svg>
  </button>

  <div class="overlay hidden" id="overlay"></div>

  <script src="data/products.js"></script>
  <script src="data/options.js"></script>
  <script src="data/kits.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
